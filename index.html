<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maitri - Credit Cooperative Society</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #0d9488, #2563eb);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: 300;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      opacity: 0.9;
    }

    .notify-box {
      margin-top: 30px;
    }

    input {
      padding: 10px;
      width: 70%;
      border: none;
      border-radius: 5px;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      background: #fff;
      color: #2563eb;
      cursor: pointer;
      font-weight: bold;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Coming Soon</h1>
  <h2>Maitri Credit Cooperative Society</h2>
  <p>We are working hard to launch our website. Stay tuned for something amazing!</p>

  <div class="notify-box">
    <input type="email" placeholder="Enter your email">
    <button>Notify Me</button>
  </div>
</div>

<footer>
  © 2026 Maitri Credit Cooperative Society
</footer>

</body>
</html>
