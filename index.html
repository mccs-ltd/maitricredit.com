<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maitri - Credit Cooperative Society</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 40px;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
    }

    .hero {
      text-align: center;
      padding: 60px;
      background: linear-gradient(to right, #0d9488, #2563eb);
      color: white;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .form-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #0d9488;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #222;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h2>MCCS</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Welcome to Our Society</h1>
  <p>Empowering members with financial growth and trust.</p>
</section>

<section class="section">
  <h2>Our Services</h2>
  <div class="cards">
    <div class="card">Savings</div>
    <div class="card">Loans</div>
    <div class="card">Deposits</div>
  </div>
</section>

<section class="section">
  <h2>Join Us</h2>
  <div class="form-box">
    <input type="text" placeholder="Name">
    <input type="text" placeholder="Phone">
    <input type="email" placeholder="Email">
    <textarea placeholder="Address"></textarea>
    <button>Submit</button>
  </div>
</section>

<footer>
  <p>© 2026 Maitri Credit Cooperative Society</p>
</footer>

</body>
</html>
